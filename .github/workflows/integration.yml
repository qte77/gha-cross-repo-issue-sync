name: Integration (dry-run)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Test reusable workflows by calling them with dry_run=true.
# Also tests the composite action indirectly (reusable workflows call it).

jobs:
  smoke-file-mode:
    name: Dry-run pull sync (file mode)
    uses: ./.github/workflows/reusable-pull.yml
    with:
      tracker_repo: ${{ github.repository }}
      repos: gha-cross-repo-issue-sync
      dry_run: 'true'
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}

  smoke-account-mode:
    name: Dry-run pull sync (account mode)
    uses: ./.github/workflows/reusable-pull.yml
    with:
      tracker_repo: ${{ github.repository }}
      repo_source: account
      dry_run: 'true'
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
