name: Reusable pull sync

on:
  workflow_call:
    inputs:
      tracker_repo:
        description: 'Tracker repo (owner/repo)'
        type: string
        required: true
      repo_source:
        description: 'file (repos.txt/repos), account (all repos for owner)'
        type: string
        default: 'file'
      repos_file:
        description: 'Path to repos.txt'
        type: string
        default: 'repos.txt'
      repos:
        description: 'Comma-separated repo list or single repo name'
        type: string
        default: ''
      owner:
        description: 'GitHub owner/org for tracked repos'
        type: string
        default: ''
      include_forks:
        type: string
        default: 'false'
      include_archived:
        type: string
        default: 'false'
      project_id:
        description: 'GitHub Projects board ID'
        type: string
        default: ''
      generate_markdown:
        type: string
        default: 'true'
      dry_run:
        type: string
        default: 'false'
    secrets:
      token:
        required: true

jobs:
  pull-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v6

      - uses: qte77/gha-cross-repo-issue-sync@v0
        with:
          direction: pull
          tracker_repo: ${{ inputs.tracker_repo }}
          repo_source: ${{ inputs.repo_source }}
          repos_file: ${{ inputs.repos_file }}
          repos: ${{ inputs.repos }}
          owner: ${{ inputs.owner || github.repository_owner }}
          include_forks: ${{ inputs.include_forks }}
          include_archived: ${{ inputs.include_archived }}
          project_id: ${{ inputs.project_id }}
          generate_markdown: ${{ inputs.generate_markdown }}
          dry_run: ${{ inputs.dry_run }}
          token: ${{ secrets.token }}

      - name: Commit TODO.md and DONE.md
        if: inputs.generate_markdown == 'true' && inputs.dry_run == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add TODO.md DONE.md
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: sync TODO/DONE"
          git push
