name: Reusable push sync

on:
  workflow_call:
    inputs:
      tracker_repo:
        description: 'Tracker repo (owner/repo). Defaults to caller repo.'
        type: string
        default: ''
    secrets:
      token:
        required: true

jobs:
  push-sync:
    runs-on: ubuntu-latest
    permissions:
      issues: read
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: qte77/gha-cross-repo-issue-sync@v0
        with:
          direction: push
          tracker_repo: ${{ inputs.tracker_repo || github.repository }}
          token: ${{ secrets.token }}
