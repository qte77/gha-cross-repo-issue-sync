# version: 0.4.2
name: 'Cross-Repo Issue Sync'
description: 'Bidirectional GitHub issue sync across repos with mirror issues, markdown generation, and Projects board aggregation.'
author: 'qte77'

branding:
  icon: 'refresh-cw'
  color: 'blue'

inputs:
  direction:
    description: 'Sync direction: pull (repos→tracker), push (tracker→repos), or both'
    required: true
  tracker_repo:
    description: 'Tracker repo (e.g. owner/.github-private-project-tracker)'
    required: true
  repos_file:
    description: 'Path to repos.txt (one repo name per line). Used for pull sync.'
    required: false
    default: 'repos.txt'
  repos:
    description: 'Comma-separated repo list (alternative to repos_file). Used for pull sync.'
    required: false
  repo_source:
    description: 'Source for repo list: file (from repos_file/repos) or account (auto-discover all repos for owner)'
    required: false
    default: 'file'
  include_forks:
    description: 'Include forked repos in account mode'
    required: false
    default: 'false'
  include_archived:
    description: 'Include archived repos in account mode'
    required: false
    default: 'false'
  owner:
    description: 'GitHub owner/org for tracked repos'
    required: false
    default: ${{ github.repository_owner }}
  token:
    description: 'GitHub token with Issues read+write on all repos'
    required: true
    default: ${{ github.token }}
  project_id:
    description: 'GitHub Projects board ID. If set, adds issues to the board.'
    required: false
  generate_markdown:
    description: 'Generate TODO.md and DONE.md in the working directory'
    required: false
    default: 'true'
  dry_run:
    description: 'Preview without making changes'
    required: false
    default: 'false'
  event_action:
    description: 'Issue event action (for push sync). Auto-set from github.event.action.'
    required: false
    default: ${{ github.event.action }}
  event_issue_number:
    description: 'Issue number that triggered the event (for push sync).'
    required: false
    default: ''
  event_label:
    description: 'Label name from the event (for labeled/unlabeled).'
    required: false
    default: ''
  event_assignee:
    description: 'Assignee login from the event (for assigned/unassigned).'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Pull sync (repos → tracker)
      if: inputs.direction == 'pull' || inputs.direction == 'both'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        TRACKER_REPO: ${{ inputs.tracker_repo }}
        OWNER: ${{ inputs.owner }}
        DRY_RUN: ${{ inputs.dry_run }}
        REPOS_FILE: ${{ inputs.repos_file }}
        REPOS_CSV: ${{ inputs.repos }}
        REPO_SOURCE: ${{ inputs.repo_source }}
        INCLUDE_FORKS: ${{ inputs.include_forks }}
        INCLUDE_ARCHIVED: ${{ inputs.include_archived }}
        GENERATE_MARKDOWN: ${{ inputs.generate_markdown }}
        PROJECT_ID: ${{ inputs.project_id }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        source "$ACTION_PATH/scripts/common.sh"
        source "$ACTION_PATH/scripts/sync-pull.sh"

        # Build repo list
        mapfile -t repos < <(build_repo_list)

        if [[ ${#repos[@]} -eq 0 ]]; then
          echo "::warning::No repos to sync. Set repos_file, repos, or repo_source=account."
          exit 0
        fi

        # Sync each repo
        for repo in "${repos[@]}"; do
          echo "--- $repo ---"
          sync_repo "$repo"
          sync_repo_prs "$repo"
        done

        # Generate markdown
        if [[ "$GENERATE_MARKDOWN" == "true" ]]; then
          # Fetch all tracker issues for markdown (mirrors + tracker-only)
          tracker_json="$(gh issue list -R "$TRACKER_REPO" --state all --limit 500 \
            --json number,title,body,state 2>/dev/null || echo "[]")"

          for repo in "${repos[@]}"; do
            repo_json="$(gh issue list -R "$OWNER/$repo" --state all --limit 200 \
              --json number,title,state 2>/dev/null || echo "[]")"
            generate_markdown "." "$repo" "$repo_json"
          done

          # Tracker-only issues
          generate_markdown "." "" "$tracker_json"
        fi

        # Add issues to GitHub Projects board
        add_to_project

        echo "Pull sync complete."

    - name: Push sync (tracker → repos)
      if: inputs.direction == 'push' || inputs.direction == 'both'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        TRACKER_REPO: ${{ inputs.tracker_repo }}
        DRY_RUN: ${{ inputs.dry_run }}
        EVENT_ACTION: ${{ inputs.event_action }}
        EVENT_ISSUE_NUMBER: ${{ inputs.event_issue_number }}
        EVENT_LABEL: ${{ inputs.event_label }}
        EVENT_ASSIGNEE: ${{ inputs.event_assignee }}
        GITHUB_ACTOR: ${{ github.actor }}
        EVENT_ISSUE_NUMBER_FALLBACK: ${{ github.event.issue.number }}
        EVENT_TITLE: ${{ github.event.issue.title }}
        EVENT_COMMENT: ${{ github.event.comment.body }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        source "$ACTION_PATH/scripts/common.sh"
        source "$ACTION_PATH/scripts/sync-push.sh"

        # Loop guard
        if is_loop "$GITHUB_ACTOR" ""; then
          echo "Skipping: event from bot actor ($GITHUB_ACTOR)"
          exit 0
        fi

        # Get issue body to extract source ref
        issue_num="${EVENT_ISSUE_NUMBER:-$EVENT_ISSUE_NUMBER_FALLBACK}"
        if [[ -z "$issue_num" ]]; then
          echo "::warning::No issue number in event. Skipping push sync."
          exit 0
        fi

        issue_body="$(gh issue view "$issue_num" -R "$TRACKER_REPO" --json body --jq '.body' 2>/dev/null || echo "")"
        source_ref="$(parse_source_ref "$issue_body")"

        if [[ -z "$source_ref" ]]; then
          echo "Tracker-only issue #$issue_num. Skipping push sync."
          exit 0
        fi

        repo="$(_issue_repo "$source_ref")"
        title="$EVENT_TITLE"

        # Strip [repo] prefix from mirror title for edited events
        if [[ "$EVENT_ACTION" == "edited" ]]; then
          title="$(echo "$title" | sed 's/^\[[^]]*\] //')"
        fi

        # Map event action
        action="$EVENT_ACTION"
        [[ "$action" == "created" ]] && action="comment_created"

        comment="$EVENT_COMMENT"

        dispatch_event "$action" "$source_ref" "$repo" "$EVENT_LABEL" "$title" "$EVENT_ASSIGNEE" "$comment"

        echo "Push sync complete for $source_ref ($action)."
